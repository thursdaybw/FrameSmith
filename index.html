<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FrameSmith</title>
    <style>
      :root {
        --bg: #eef2f6;
        --ink: #131720;
        --muted: #4b5563;
        --card: #ffffff;
        --line: #d3dae5;
        --accent: #0f62fe;
        --accent-ink: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--ink);
        background:
          radial-gradient(1000px 600px at 20% -30%, #ffffff 0%, transparent 70%),
          radial-gradient(900px 500px at 100% 0%, #dbe7ff 0%, transparent 65%),
          var(--bg);
      }

      .app-shell {
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }

      .editor-layout {
        width: min(100%, 520px);
      }

      .stage-wrap {
        position: relative;
        border: 1px solid var(--line);
        border-radius: 22px;
        background: var(--card);
        box-shadow: 0 14px 44px rgba(17, 24, 39, 0.16);
        overflow: hidden;
      }

      .stage {
        position: relative;
        width: 100%;
        aspect-ratio: 9 / 16;
        background: #0b0d13;
      }

      #v,
      #c {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #v {
        display: none;
        z-index: 1;
        background: #000;
      }

      #c {
        z-index: 2;
        pointer-events: none;
        display: none;
        background: transparent;
      }

      .empty-state {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: center;
        z-index: 4;
      }

      .empty-card {
        width: min(88%, 320px);
        border-radius: 16px;
        padding: 16px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--line);
      }

      .empty-title {
        margin: 0 0 8px 0;
        font-size: 17px;
        font-weight: 700;
      }

      .empty-subtitle {
        margin: 0 0 14px 0;
        font-size: 13px;
        color: var(--muted);
      }

      #videoFileInput {
        width: 100%;
        font-size: 13px;
      }

      .action-rail {
        position: absolute;
        right: 10px;
        top: 50%;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 5;
      }

      .action-btn {
        width: 92px;
        border: 0;
        border-radius: 999px;
        padding: 10px 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2px;
        background: rgba(15, 98, 254, 0.92);
        color: var(--accent-ink);
        box-shadow: 0 8px 16px rgba(15, 98, 254, 0.25);
      }

      .action-btn[disabled] {
        opacity: 0.35;
        box-shadow: none;
      }

      .transcript-panel {
        position: absolute;
        top: 16px;
        right: 16px;
        width: min(360px, 70vw);
        max-height: 65vh;
        background: rgba(6, 9, 16, 0.92);
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
        display: flex;
        flex-direction: column;
        opacity: 0;
        visibility: hidden;
        transform: translateY(-8px);
        pointer-events: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
        z-index: 6;
      }

      .transcript-panel.visible {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
        pointer-events: auto;
      }

      .transcript-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.4px;
        color: #f9fbff;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .transcript-panel-body {
        padding: 10px 14px;
        overflow: auto;
        flex: 1;
      }

      .transcript-panel-body pre {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-size: 13px;
        color: #e4e9f5;
        line-height: 1.4;
      }

      .transcript-panel-actions {
        padding: 10px 14px 12px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .transcript-panel-button {
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: #f6f6ff;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s ease;
      }

      .transcript-panel-button:hover:not([disabled]) {
        background: rgba(255, 255, 255, 0.16);
      }

      .transcript-panel-close-btn {
        background: transparent;
        border: 0;
        color: #f6f6ff;
        font-size: 18px;
        cursor: pointer;
        padding: 0;
        line-height: 1;
      }

      .meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px 12px 12px 12px;
        font-size: 12px;
      }

      #videoSourceStatus {
        color: var(--muted);
      }

      .run-status {
        display: none;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        font-weight: 700;
        color: #9a3412;
      }

      .run-status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #f97316;
        animation: pulse 1s ease-in-out infinite;
      }

      .status-cluster {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .transcription-status {
        color: #0f766e;
      }

      .transcription-status::before {
        background: #14b8a6;
      }

      .transcription-status.done {
        color: #166534;
      }

      .transcription-status.done::before {
        background: #22c55e;
        animation: none;
      }

      .transcription-status.error {
        color: #b00020;
      }

      .transcription-status.error::before {
        background: #ef4444;
        animation: none;
      }

      @keyframes pulse {
        0% { opacity: 0.4; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1); }
        100% { opacity: 0.4; transform: scale(0.8); }
      }

      .diagnostics {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #0e1420;
        overflow: hidden;
      }

      .diagnostics > summary {
        cursor: pointer;
        user-select: none;
        font-size: 12px;
        font-weight: 700;
        color: #d4dbeb;
        padding: 10px 12px;
      }

      #encodeDiagnosticsPanel {
        margin: 0;
        max-height: 220px;
        overflow: auto;
        background: #0a1020;
        color: #9ef;
        padding: 8px 12px 12px 12px;
        white-space: pre-wrap;
        font-size: 12px;
        border-top: 1px solid #1a243a;
      }

      body.has-source .empty-state {
        display: none;
      }

      body.preview-active #c {
        display: block;
      }

      body:not(.has-source) .action-rail {
        left: 12px;
        right: 12px;
        top: auto;
        bottom: 12px;
        transform: none;
        flex-direction: row;
        justify-content: center;
      }

      body:not(.has-source) .action-btn {
        width: 96px;
      }
    </style>
  </head>
  <body data-framesmith-app-root>
    <main class="app-shell">
      <section class="editor-layout">
        <article class="stage-wrap">
          <div class="stage">
            <video id="v"></video>
            <canvas id="c"></canvas>
            <div class="empty-state">
              <div class="empty-card">
                <p class="empty-title">Load a Video</p>
                <p class="empty-subtitle">Pick a clip to preview, brand, and export.</p>
                <input id="videoFileInput" type="file" accept="video/mp4,video/*" />
              </div>
            </div>
          <div class="action-rail">
            <button id="previewBtn" class="action-btn">Play</button>
            <select id="transcriptionModeSelect" class="action-btn" aria-label="Transcription mode">
              <option value="auto">Auto</option>
              <option value="local">Local</option>
              <option value="server">Server</option>
            </select>
            <select id="transcriptionModelSelect" class="action-btn" aria-label="Local transcription model">
              <option value="onnx-community/whisper-base_timestamped">Base</option>
              <option value="onnx-community/whisper-tiny.en_timestamped">Tiny</option>
            </select>
            <button id="transcribeBtn" class="action-btn">Transcribe</button>
            <button id="showTranscriptBtn" class="action-btn" disabled type="button">Transcript</button>
            <button id="encodeBtn" class="action-btn">Encode</button>
            <button id="exportBtn" class="action-btn" disabled="disabled">Export</button>
          </div>

          <div class="transcript-panel" id="transcriptPanel" role="dialog" aria-modal="false">
            <div class="transcript-panel-header">
              <span>Transcript</span>
              <button id="transcriptPanelCloseBtn" class="transcript-panel-close-btn" type="button" aria-label="Close transcript panel">×</button>
            </div>
            <div class="transcript-panel-body">
              <pre id="transcriptPanelText">Transcript not available yet.</pre>
            </div>
            <div class="transcript-panel-actions">
              <button id="copyTranscriptBtn" class="transcript-panel-button" type="button" disabled>Copy</button>
              <button id="closeTranscriptPanelBtn" class="transcript-panel-button" type="button">Close</button>
            </div>
          </div>
          </div>
          <div class="meta-row">
            <span id="videoSourceStatus"></span>
            <div class="status-cluster">
              <span id="transcriptionRunStatus" class="run-status transcription-status">Transcribe…</span>
              <span id="encodeRunStatus" class="run-status">Encoding…</span>
            </div>
          </div>
        </article>
        <details class="diagnostics">
          <summary>Encode Diagnostics</summary>
          <pre id="encodeDiagnosticsPanel"></pre>
        </details>
      </section>
    </main>

    <script type="importmap">
    {
      "imports": {
        "onnxruntime-web/webgpu": "./vendor/onnxruntime-web/1.25.0-dev.20260327-722743c0e2/dist/ort.webgpu.bundle.min.mjs",
        "onnxruntime-web/wasm": "./vendor/onnxruntime-web/1.25.0-dev.20260327-722743c0e2/dist/ort.wasm.bundle.min.mjs",
        "onnxruntime-web": "./vendor/onnxruntime-web/1.25.0-dev.20260327-722743c0e2/dist/ort.webgpu.bundle.min.mjs",
        "onnxruntime-common": "./vendor/onnxruntime-common/1.24.0-dev.20251116-b39e144322/dist/esm/index.js"
      }
    }
    </script>
    <script type="module" src="script.js"></script>
    <!--<script type="module" src="preview.js"></script>-->

  </body>
</html>
