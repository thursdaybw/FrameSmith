<!DOCTYPE html>
<html>
  <body>
    <h1>Video Player</h1>
    <video id="v" src="webcodecs-native-muxer.mp4" style="display:none"></video>
    <div>
      <input id="videoFileInput" type="file" accept="video/mp4,video/*" />
      <span id="videoSourceStatus"></span>
    </div>
    <canvas id="c"></canvas>
    <button id="previewBtn">Play preview</button>
    <button id="encodeBtn">Encode</button>
    <button id="exportBtn" disabled="disabled">Export</button>
    <h3>Encode Diagnostics</h3>
    <pre id="encodeDiagnosticsPanel" style="max-height: 220px; overflow:auto; background:#111; color:#9ef; padding:8px; white-space:pre-wrap; font-size:12px;"></pre>

    <script src="vendor/mp4box.js/dist/mp4box.all.global.js"></script>

    <script type="module" src="script.js"></script>
    <!--<script type="module" src="preview.js"></script>-->

    <script type="module" src="./test_script.js"></script>

  </body>
</html>
