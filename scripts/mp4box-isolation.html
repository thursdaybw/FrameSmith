<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demux Isolation Compare</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      line-height: 1.4;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    input {
      flex: 1;
      padding: 8px;
      font-size: 14px;
    }
    button {
      padding: 8px 12px;
      font-size: 14px;
    }
    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 12px;
      max-height: 300px;
      overflow: auto;
    }
  </style>
</head>
<body>
  <h1>Demux Isolation Compare</h1>
  <p>Logs go to browser console with <code>[IsolatedDemux]</code> labels for <code>mp4box</code>, <code>native</code>, and compare output.</p>

  <div class="row">
    <input id="srcInput" type="text" value="../test.mp4" />
    <button id="runBtn" type="button">Run Demux Compare</button>
  </div>

  <pre id="status">Idle.</pre>

  <script src="../vendor/mp4box.js/dist/mp4box.all.global.js"></script>
  <script type="module" src="./mp4box-isolation-demux.js"></script>
</body>
</html>
